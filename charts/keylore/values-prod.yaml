replicaCount: 3

app:
  environment: production
  logLevel: info
  bootstrapFromFiles: false

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 6
  targetCPUUtilizationPercentage: 65

serviceMonitor:
  enabled: true

networkPolicy:
  enabled: true

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

postgresql:
  enabled: false
