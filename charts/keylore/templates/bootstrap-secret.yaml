{{- if not .Values.bootstrapSecrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "keylore.bootstrapSecretName" . }}
  labels:
    {{- include "keylore.labels" . | nindent 4 }}
type: Opaque
stringData:
  KEYLORE_BOOTSTRAP_ADMIN_CLIENT_SECRET: {{ .Values.bootstrapSecrets.adminClientSecret | quote }}
  KEYLORE_BOOTSTRAP_CONSUMER_CLIENT_SECRET: {{ .Values.bootstrapSecrets.consumerClientSecret | quote }}
  KEYLORE_SECRET_GITHUB_READONLY: {{ .Values.bootstrapSecrets.githubReadonly | quote }}
  KEYLORE_SECRET_NPM_READONLY: {{ .Values.bootstrapSecrets.npmReadonly | quote }}
  KEYLORE_NOTIFICATION_SIGNING_SECRET: {{ .Values.bootstrapSecrets.notificationSigningSecret | quote }}
{{- end }}
